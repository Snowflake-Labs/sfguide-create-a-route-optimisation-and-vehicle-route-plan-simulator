definition_version: 2
entities:
  pkg:
    type: application package
    identifier: demo_dashboard_pkg
    artifacts:
      - src: setup_script.sql
        dest: ./
      - src: manifest.yml
        dest: ./
      - src: services/demo_dashboard_service.yaml
        dest: services/
    meta:
      role: ACCOUNTADMIN
      warehouse: MY_WH
  app:
    type: application
    from:
      target: pkg
    identifier: demo_dashboard_app
    debug: false
    meta:
      role: ACCOUNTADMIN
      warehouse: MY_WH
