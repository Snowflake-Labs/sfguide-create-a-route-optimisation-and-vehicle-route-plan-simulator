# Synthetic Truck Telemetry Generator Configuration
# San Francisco region - HGV truck fleet for route deviation + dwell analysis demos

mode: trucking

seed: 42

snowflake:
  connection_name: null
  database: SYNTHETIC_DATASETS
  schema: FLEET_INTELLIGENCE
  warehouse: COMPUTE_WH

region:
  name: san_francisco
  bbox:
    min_lat: 37.700
    max_lat: 37.820
    min_lng: -122.520
    max_lng: -122.350

time:
  start_date: "2026-02-01"
  end_date: "2026-02-28"
  duration_months: 1
  chunk_size_days: 7

fleet:
  num_trucks: 100
  weekday_operating_rate: 0.85
  weekend_operating_rate: 0.40
  trips_per_day:
    min: 2
    max: 4

distance_distribution:
  short_pct: 0.70
  short_max_km: 5
  medium_pct: 0.25
  medium_max_km: 12
  long_pct: 0.05

driver_profiles:
  COMPLIANT:
    proportion: 0.92
    detour_probability: 0.05
    speeding_probability: 0.02
    hos_violation_probability: 0.005
    speed_variance: 0.05

  MILD:
    proportion: 0.06
    detour_probability: 0.15
    speeding_probability: 0.12
    hos_violation_probability: 0.03
    speed_variance: 0.10

  OUTLIER:
    proportion: 0.02
    detour_probability: 0.30
    speeding_probability: 0.25
    hos_violation_probability: 0.08
    speed_variance: 0.18

routing:
  optimal_route_probability: 0.70
  alternative_route_probability: 0.20
  mid_trip_deviation_probability: 0.05
  major_deviation_probability: 0.05

  ors:
    service: "OPENROUTESERVICE_NATIVE_APP.CORE.DIRECTIONS"
    profile: "driving-hgv"
    batch_size: 200
    cache_enabled: true

  posted_speeds:
    motorway: 55
    trunk: 45
    primary: 35
    secondary: 30
    tertiary: 25
    residential: 20
    default: 30

telemetry:
  ping_interval:
    moving:
      target_sec: 30
      variance_sec: 10
    dwell:
      min_sec: 300
      max_sec: 600
    overnight:
      min_sec: 600
      max_sec: 1200

  gps_jitter:
    typical_m: 10
    typical_std_m: 5
    multipath_probability: 0.02
    multipath_max_m: 150

  gaps:
    probability: 0.01
    min_duration_min: 5
    max_duration_min: 30

  out_of_order_probability: 0.001

dwell:
  warehouse:
    loading:
      median_min: 45
      sigma: 0.8
      max_min: 480
    long_dwell_probability: 0.05
    long_dwell_min: 480
    long_dwell_max: 1440

  rest_stop:
    short_break:
      median_min: 15
      sigma: 0.5
      max_min: 45
    mandatory_break:
      median_min: 45
      sigma: 0.3
      max_min: 90
    overnight:
      median_min: 600
      sigma: 0.2
      max_min: 720

overnight:
  return_home_threshold_km: 5
  return_home_time_threshold_min: 30
  workday_end_hour: 20
  next_day_start_hour: 6

breaks:
  driving_hours_between_breaks: 4.5
  mandatory_break_after_hours: 4.5
  mandatory_break_duration_min: 45
  max_daily_driving_hours: 9.0
  corridor_buffer_km: 5

speeding:
  threshold_factor: 1.08
  severe_threshold: 1.20

output:
  parquet_dir: "output/"
  stage_name: "@SYNTHETIC_DATASETS.FLEET_INTELLIGENCE.TELEMETRY_STAGE"
  tables:
    warehouses: "SF_DIM_WAREHOUSE"
    stops: "SF_DIM_STOP"
    trucks: "SF_DIM_TRUCK"
    drivers: "SF_DIM_DRIVER"
    trips: "SF_FACT_TRIP"
    telemetry: "SF_FACT_TRUCK_TELEMETRY"
    violations: "SF_FACT_VIOLATION"
