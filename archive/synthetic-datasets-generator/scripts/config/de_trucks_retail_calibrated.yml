# Calibrated Synthetic Truck Telemetry Generator Configuration
# Tuned to match real-world fleet statistics

mode: trucking

seed: 42

snowflake:
  connection_name: airpublic
  database: FLEET_INTELLIGENCE
  schema: ROUTE_CACHE
  warehouse: INSTALLER

region:
  name: germany
  bbox:
    min_lat: 47.27
    max_lat: 55.06
    min_lng: 5.87
    max_lng: 15.04

time:
  start_date: "2025-12-01"
  end_date: "2025-12-03"
  chunk_size_days: 7

# Fleet composition - heterogeneous truck types
fleet:
  num_trucks: 10
  
  # Truck type distribution (critical for realism)
  truck_types:
    regional:
      proportion: 0.65          # 65% regional operators
      trips_per_day: {min: 2, max: 3}
      avg_trip_distance_km: 120
      speed_profile: "mixed"    # 55-70 km/h avg
      dwell_ratio: 0.12         # More dwell time
      
    long_haul:
      proportion: 0.25          # 25% long-haul
      trips_per_day: {min: 1, max: 1}
      avg_trip_distance_km: 450
      speed_profile: "highway"  # 65-80 km/h avg
      dwell_ratio: 0.06         # Less dwell, more driving
      
    low_utilization:
      proportion: 0.10          # 10% low-util/specialized
      trips_per_day: {min: 0, max: 2}
      avg_trip_distance_km: 80
      speed_profile: "urban"    # 25-45 km/h avg
      dwell_ratio: 0.18         # Most dwell time
  
  # Operating rates (weekend dip is critical)
  weekday_operating_rate: 0.88   # 88% weekdays
  weekend_operating_rate: 0.35   # 35% weekends (significant drop)
  
  # Active days variance (60-85 days per 3 months)
  active_days_per_month:
    mean: 22
    std: 3
    min: 18
    max: 26

# Distance distribution (right-skewed)
distance_distribution:
  short_pct: 0.55        # 55% short trips (<100km)
  short_max_km: 100
  medium_pct: 0.32       # 32% medium (100-350km)
  medium_max_km: 350
  long_pct: 0.13         # 13% long-haul (>350km)
  
  # Trip distance stats (median 180-350km, P75 400-700km)
  repositioning_probability: 0.05  # 5% very short <10km trips

# Driver behavior profiles - calibrated for realistic speeding
driver_profiles:
  COMPLIANT:
    proportion: 0.70           # 70% - clean drivers
    speeding_probability: 0.03 # 3% speeding (minor)
    severe_speeding_prob: 0.002
    hos_violation_probability: 0.02  # 2% days >9h
    detour_probability: 0.08
    speed_variance: 0.06
    
  MILD:
    proportion: 0.25           # 25% - average drivers
    speeding_probability: 0.08 # 8% speeding
    severe_speeding_prob: 0.01
    hos_violation_probability: 0.05  # 5% days >9h
    detour_probability: 0.15
    speed_variance: 0.10
    
  OUTLIER:
    proportion: 0.05           # 5% - aggressive drivers
    speeding_probability: 0.18 # 18% speeding
    severe_speeding_prob: 0.04
    hos_violation_probability: 0.12  # 12% days >9h
    detour_probability: 0.25
    speed_variance: 0.15

# Route configuration
routing:
  optimal_route_probability: 0.75
  alternative_route_probability: 0.18  # 18% alternative routes
  meaningful_detour_probability: 0.04  # 4% detours >5% extra
  mid_trip_reroute_probability: 0.03   # 3% mid-trip changes
  
  ors:
    service: "OPENROUTESERVICE_NATIVE_APP.CORE.DIRECTIONS"
    profile: "driving-hgv"
    cache_enabled: true

  # Posted speed limits (km/h)
  posted_speeds:
    motorway: 80
    trunk: 80
    primary: 70
    secondary: 60
    tertiary: 50
    residential: 30
    default: 60

# Speed behavior - bimodal distribution
speed:
  # Base speeds by road type (km/h)
  highway:
    mean: 75
    std: 8
    min: 60
    max: 90
  urban:
    mean: 35
    std: 10
    min: 15
    max: 50
  regional:
    mean: 58
    std: 12
    min: 40
    max: 75
    
  # Fleet-wide target: 58-72 km/h average
  target_fleet_avg_min: 58
  target_fleet_avg_max: 72
  
  # Speeding thresholds
  speeding_threshold_factor: 1.08   # >8% over = speeding
  severe_threshold_factor: 1.20     # >20% over = severe
  extreme_speed_max: 130            # <0.5% should exceed this

# Telemetry emission - realistic intervals
telemetry:
  ping_interval:
    moving:
      mean_sec: 30
      std_sec: 8           # Variance 20-40 sec
      min_sec: 15
      max_sec: 60
    dwell:
      mean_sec: 420        # 7 minutes avg
      std_sec: 120
      min_sec: 120         # 2 min
      max_sec: 900         # 15 min
    overnight:
      mean_sec: 900        # 15 min
      std_sec: 300
      min_sec: 300
      max_sec: 1800
      
  # Telemetry gaps (0.2-2% of intervals)
  gaps:
    probability: 0.008     # 0.8% chance of gap
    min_duration_sec: 300  # 5 min
    max_duration_sec: 1200 # 20 min
    rural_multiplier: 2.5  # More gaps in rural areas
    
  gps_jitter:
    typical_m: 8
    typical_std_m: 4
    multipath_probability: 0.015
    multipath_max_m: 120

# Dwell time distributions (lognormal, right-skewed)
dwell:
  warehouse:
    # Median 30-60 min, P75 1.5-2.5h, P90 3-6h
    median_min: 45
    sigma: 0.9             # Strong right skew
    min_min: 10
    max_min: 360           # 6h normal max
    
    # Rare long dwell tail (1-3% of events)
    long_dwell_probability: 0.025
    long_dwell_min: 480    # 8h
    long_dwell_max: 1440   # 24h
    
  rest_stop:
    # Fuel/short break: median 15-30 min
    short:
      median_min: 22
      sigma: 0.6
      min_min: 5
      max_min: 60
    # Mandatory break: 45 min EU regulation
    mandatory:
      median_min: 48
      sigma: 0.25
      min_min: 45
      max_min: 90
    # Overnight: 9-11h typical
    overnight:
      median_min: 600
      sigma: 0.15
      min_min: 540
      max_min: 720

  # Target composition (% of all points)
  target_composition:
    moving_pct: {min: 0.78, max: 0.86}
    warehouse_dwell_pct: {min: 0.05, max: 0.09}
    overnight_pct: {min: 0.06, max: 0.12}
    idle_pct: {min: 0.02, max: 0.06}

# Hours of Service
hos:
  max_daily_driving_hours: 9.0
  max_daily_driving_hours_extended: 10.0
  
  # Violation distribution
  days_over_9h_target_pct: 0.035    # 3.5% of truck-days
  days_over_10h_target_pct: 0.012   # 1.2% of truck-days
  
  # Weekly clustering (violations more likely Thu-Fri)
  weekly_violation_weights:
    monday: 0.8
    tuesday: 0.9
    wednesday: 1.0
    thursday: 1.4
    friday: 1.5
    saturday: 0.6
    sunday: 0.4
    
  # Chronic violators (<2% of drivers)
  chronic_violator_pct: 0.02

# Breaks
breaks:
  driving_hours_between_breaks: 4.5
  mandatory_break_duration_min: 45
  break_duration_variance_min: 10

overnight:
  return_home_threshold_km: 60
  return_home_time_threshold_min: 100
  workday_end_hour: 19
  next_day_start_hour: 6
  
  # Start time variance
  start_hour_mean: 6.5
  start_hour_std: 1.0

# Output
output:
  parquet_dir: "output/"
  stage_name: "@FLEET_INTELLIGENCE.ROUTE_CACHE.TELEMETRY_STAGE"
  tables:
    warehouses: "DIM_WAREHOUSE"
    stops: "DIM_STOP"
    trucks: "DIM_TRUCK"
    drivers: "DIM_DRIVER"
    trips: "FACT_TRIP_TEST"
    telemetry: "FACT_TRUCK_TELEMETRY_TEST"
    violations: "FACT_VIOLATION_TEST"
