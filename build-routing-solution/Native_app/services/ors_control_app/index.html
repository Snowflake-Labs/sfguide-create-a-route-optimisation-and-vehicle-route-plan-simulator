<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORS Control</title>
    <style>
      :root { --bg: #0a0a0f; --surface: #14141f; --border: #2a2a3a; --text: #e8e8f0; --text-secondary: #8888a0; --accent: #FF6B35; --green: #30D158; --yellow: #FF9500; --red: #FF3B30; }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
      .app { min-height: 100vh; }
      .app-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; border-bottom: 1px solid var(--border); background: var(--surface); }
      .app-logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
      .app-tabs { display: flex; gap: 4px; }
      .tab { padding: 8px 16px; border-radius: 6px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; }
      .tab:hover { background: rgba(255,255,255,0.05); }
      .tab.active { background: var(--accent); color: white; }
      .app-main { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .panel { background: var(--surface); border-radius: 12px; padding: 24px; }
      .panel h2 { font-size: 20px; margin-bottom: 4px; }
      .panel h3 { font-size: 14px; color: var(--text-secondary); margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.5px; }
      .subtitle { color: var(--text-secondary); font-size: 13px; margin-bottom: 16px; }
      .loading-text, .empty-state { color: var(--text-secondary); font-size: 13px; padding: 16px 0; }
      .status-grid, .estimate-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
      .status-card, .estimate-card { padding: 16px; border-radius: 8px; background: rgba(255,255,255,0.03); border: 1px solid var(--border); }
      .status-card.ok { border-color: rgba(48,209,88,0.3); }
      .status-card.warn { border-color: rgba(255,149,0,0.3); }
      .status-label, .estimate-label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; }
      .status-value, .estimate-value { font-size: 18px; font-weight: 600; margin-top: 4px; }
      .estimate-card.primary { border-color: var(--accent); }
      .estimate-card.highlight { background: rgba(255,107,53,0.08); border-color: var(--accent); }
      .services-table { width: 100%; border-collapse: collapse; font-size: 13px; }
      .services-table th { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); color: var(--text-secondary); font-weight: 500; }
      .services-table td { padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.03); }
      .services-table .highlight-row { background: rgba(255,107,53,0.05); }
      .badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
      .badge.ok { background: rgba(48,209,88,0.15); color: var(--green); }
      .badge.warn { background: rgba(255,149,0,0.15); color: var(--yellow); }
      .badge.error { background: rgba(255,59,48,0.15); color: var(--red); }
      .action-row { display: flex; gap: 8px; align-items: center; margin-top: 12px; }
      .scale-row { display: flex; gap: 12px; align-items: end; }
      .scale-row label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--text-secondary); }
      .scale-row input[type=number] { width: 80px; padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
      .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
      .btn.primary { background: var(--accent); color: white; }
      .btn.secondary { background: rgba(255,255,255,0.08); color: var(--text); }
      .btn.danger { background: rgba(255,59,48,0.15); color: var(--red); }
      .btn.small { padding: 4px 10px; font-size: 11px; }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 13px; }
      .city-info { margin: 12px 0; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.03); }
      .info-row { display: flex; gap: 8px; font-size: 13px; margin: 4px 0; }
      .info-label { color: var(--text-secondary); min-width: 100px; }
      .info-url { word-break: break-all; font-size: 11px; }
      .provision-form { display: flex; flex-direction: column; gap: 12px; }
      .provision-progress { margin-top: 16px; }
      .progress-step { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 6px; margin: 4px 0; opacity: 0.4; }
      .progress-step.done { opacity: 1; }
      .progress-step.active { opacity: 1; background: rgba(255,107,53,0.08); }
      .step-icon { font-size: 16px; min-width: 24px; text-align: center; }
      .step-message { color: var(--text-secondary); font-size: 12px; margin-left: auto; }
      .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
      .region-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; text-align: left; }
      .region-card.active { border-color: var(--accent); background: rgba(255,107,53,0.05); }
      .region-name { font-weight: 500; font-size: 14px; }
      .region-detail { font-size: 11px; color: var(--text-secondary); }
      .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .dot.green { background: var(--green); }
      .dot.yellow { background: var(--yellow); }
      .res-grid { display: grid; gap: 8px; }
      .res-card { display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; }
      .res-card.active { border-color: var(--accent); background: rgba(255,107,53,0.05); }
      .res-label { font-weight: 500; font-size: 13px; }
      .res-detail { font-size: 11px; color: var(--text-secondary); }
      .savings { color: var(--green); font-weight: 500; }
      .fn-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
      .fn-card { padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--text); cursor: pointer; text-align: left; }
      .fn-card.active { border-color: var(--accent); background: rgba(255,107,53,0.05); }
      .fn-name { font-weight: 600; font-size: 13px; }
      .fn-sig { font-size: 11px; color: var(--text-secondary); font-family: monospace; }
      .sql-editor { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; resize: vertical; }
      .duration { font-size: 12px; color: var(--text-secondary); }
      .error-banner { margin-top: 12px; padding: 12px; border-radius: 8px; background: rgba(255,59,48,0.08); border: 1px solid rgba(255,59,48,0.2); color: var(--red); font-size: 13px; }
      .result-panel { margin-top: 16px; }
      .result-json { padding: 16px; border-radius: 8px; background: var(--bg); border: 1px solid var(--border); font-family: 'SF Mono', monospace; font-size: 12px; overflow-x: auto; max-height: 400px; overflow-y: auto; white-space: pre-wrap; }
      .progress-card { margin: 8px 0; padding: 12px; border-radius: 8px; background: rgba(255,255,255,0.02); }
      .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 13px; }
      .stage-pipeline { display: flex; gap: 4px; margin-bottom: 8px; }
      .stage-step { display: flex; flex-direction: column; align-items: center; gap: 2px; font-size: 10px; opacity: 0.3; padding: 4px 8px; }
      .stage-step.done { opacity: 1; color: var(--green); }
      .stage-step.active { opacity: 1; color: var(--accent); }
      .progress-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
      .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
      .progress-stats { display: flex; gap: 16px; font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
      .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
      .existing-info { font-size: 12px; color: var(--text-secondary); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
