name: travel-time-matrix
description: |
  Calculate travel time and distance matrices at scale using ORS MATRIX_TABULAR 
  in Snowflake. Works for any geography — from a single city to an entire country.
  
  Core pattern: Raw dump VARIANT payloads → bulk FLATTEN post-processing.
  Includes infrastructure scaling (multi-cluster warehouses, ORS/gateway instance 
  scaling), adaptive batch sizing, resume-safe parallel workers, and retry logic.
  
  Supports parameterized regions with presets for city, metro, state, and country.
  
  Use when: building travel time matrices at any scale, bulk routing with ORS, 
  H3 hexagon-based OD matrices, scaling ORS native app, pre-computing matrices 
  for VROOM optimization, origin-destination analysis for any region size.
  
  Triggers: travel time matrix, distance matrix, H3 routing, ORS MATRIX, 
  MATRIX_TABULAR, all-pairs routing, bulk routing, scale ORS, raw dump flatten, 
  work queue, parallel workers, route optimization matrix, VROOM matrices,
  city routing, metro routing, statewide routing, country routing,
  small city matrix, delivery zone matrix, last mile matrix.

