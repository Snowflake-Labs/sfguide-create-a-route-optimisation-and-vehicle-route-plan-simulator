################################################################################################
### ORS Config Template — Travel Time Matrix at Scale                                      ###
### Replace <OSM_FILE> with your region's OSM extract filename                             ###
### Upload this to the ORS stage along with the .osm.pbf file                              ###
### https://giscience.github.io/openrouteservice/run-instance/configuration/               ###
###                                                                                        ###
### OSM extract sources:                                                                   ###
###   Cities:    https://extract.bbbike.org/                                               ###
###   Countries: https://download.geofabrik.de/                                            ###
################################################################################################
ors:
  engine:
    profile_default:
      build:  
        source_file: /home/ors/files/<OSM_FILE>
        instructions: false
        service:
        maximum_visited_nodes: 100000000
    profiles:   
      driving-car: 
        enabled: true
      driving-hgv: 
        enabled: false
      cycling-regular:
        enabled: false
      cycling-road:
        enabled: false
      cycling-mountain:
        enabled: false
      cycling-electric:
        enabled: false
      foot-walking:
        enabled: false
      foot-hiking:
        enabled: false
      wheelchair:
        enabled: false
  endpoints:
    matrix:
      maximum_visited_nodes: 100000000
      maximum_routes: 250000
