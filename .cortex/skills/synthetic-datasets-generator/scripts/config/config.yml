# Synthetic Truck Telemetry Generator Configuration
# All settings are configurable and seed is deterministic for reproducibility

seed: 42  # Deterministic RNG seed for reproducibility

# Snowflake connection
snowflake:
  connection_name: null  # Use SNOWFLAKE_CONNECTION_NAME env var if null
  database: FLEET_INTELLIGENCE
  schema: ROUTE_CACHE
  warehouse: INSTALLER
  
# Geographic region (Germany bounding box)
region:
  name: germany
  bbox:
    min_lat: 47.27
    max_lat: 55.06
    min_lng: 5.87
    max_lng: 15.04

# Time configuration
time:
  start_date: "2025-12-01"  # First day of simulation
  end_date: "2025-12-31"    # Last day of simulation (1 month test)
  duration_months: 1         # Generate 1 month of data for testing
  chunk_size_days: 7         # Process in weekly chunks for memory efficiency

# Fleet configuration
fleet:
  num_trucks: 10          # Start with 10 trucks for testing
  weekday_operating_rate: 0.85  # 85% of trucks operate on weekdays
  weekend_operating_rate: 0.40  # 40% operate on weekends
  trips_per_day:
    min: 1
    max: 3

# Distance distribution for destination selection
distance_distribution:
  short_pct: 0.60       # 60% short trips
  short_max_km: 100     # <100km
  medium_pct: 0.30      # 30% medium trips
  medium_max_km: 300    # 100-300km
  long_pct: 0.10        # 10% long-haul >300km
  
# Driver behavior profiles (mixture model)
# NOTE: Even compliant drivers may have rare anomalies - anomalies are event-level
driver_profiles:
  COMPLIANT:
    proportion: 0.92          # 92% of drivers
    detour_probability: 0.05  # 5% chance of taking alternative route
    speeding_probability: 0.02  # 2% chance of speeding on any segment
    hos_violation_probability: 0.005  # 0.5% chance of >9h driving day
    speed_variance: 0.05      # ±5% speed variation
    
  MILD:
    proportion: 0.06          # 6% of drivers
    detour_probability: 0.15  # 15% chance of detour
    speeding_probability: 0.12  # 12% speeding
    hos_violation_probability: 0.03  # 3% HOS violations
    speed_variance: 0.10      # ±10% variation
    
  OUTLIER:
    proportion: 0.02          # 2% of drivers
    detour_probability: 0.30  # 30% detour rate
    speeding_probability: 0.25  # 25% speeding
    hos_violation_probability: 0.08  # 8% HOS violations
    speed_variance: 0.18      # ±18% variation

# Route configuration
routing:
  optimal_route_probability: 0.70   # 70% take optimal routes
  alternative_route_probability: 0.20  # 20% choose alternative
  mid_trip_deviation_probability: 0.05  # 5% deviate mid-trip
  major_deviation_probability: 0.05    # 5% major deviations
  
  # ORS service (Snowflake native app)
  ors:
    service: "OPENROUTESERVICE_NATIVE_APP.CORE.DIRECTIONS"
    profile: "driving-hgv"
    batch_size: 200  # Max routes per batch (API limit ~20MB response)
    cache_enabled: true
    
  # Speed limits by road class (km/h) - used for speeding detection
  posted_speeds:
    motorway: 80      # Trucks limited to 80 on Autobahn
    trunk: 80
    primary: 70
    secondary: 60
    tertiary: 50
    residential: 30
    default: 60

# Telemetry emission settings
telemetry:
  # Ping intervals for continuous telemetry
  ping_interval:
    moving:
      target_sec: 30      # Target 30-second intervals while driving
      variance_sec: 10    # +/- 10 seconds variance (20-40 sec range)
    dwell:
      min_sec: 300        # 5 minutes when stopped at warehouse/rest stop
      max_sec: 600        # 10 minutes max dwell interval
    overnight:
      min_sec: 600        # 10 minutes overnight
      max_sec: 1200       # 20 minutes overnight
      
  # GPS accuracy simulation
  gps_jitter:
    typical_m: 10       # Typical accuracy 3-15m
    typical_std_m: 5
    multipath_probability: 0.02  # 2% chance of multipath spike
    multipath_max_m: 150        # 50-200m spikes
    
  # Telemetry gaps (simulates signal loss)
  gaps:
    probability: 0.01        # 1% of segments have gaps
    min_duration_min: 5
    max_duration_min: 30
    
  # Out-of-order messages (very rare)
  out_of_order_probability: 0.001

# Dwell time distributions (lognormal)
dwell:
  warehouse:
    loading:
      median_min: 45    # Median 45 min for loading
      sigma: 0.8        # Lognormal sigma
      max_min: 480      # Max 8 hours
    long_dwell_probability: 0.05  # 5% chance of very long dwell (8-24h)
    long_dwell_min: 480
    long_dwell_max: 1440
    
  rest_stop:
    short_break:
      median_min: 15
      sigma: 0.5
      max_min: 45
    mandatory_break:
      median_min: 45    # EU mandatory 45-min break
      sigma: 0.3
      max_min: 90
    overnight:
      median_min: 600   # 10 hours overnight
      sigma: 0.2
      max_min: 720

# Overnight and return-home logic
overnight:
  return_home_threshold_km: 50       # Return home if within 50km
  return_home_time_threshold_min: 90 # Return home if trip < 90 min
  workday_end_hour: 20               # End work by 8 PM
  next_day_start_hour: 6             # Start next day at 6 AM

# Rest stop insertion rules
breaks:
  driving_hours_between_breaks: 4.5  # EU regulation
  mandatory_break_after_hours: 4.5
  mandatory_break_duration_min: 45
  max_daily_driving_hours: 9.0       # EU regulation
  corridor_buffer_km: 30             # Search for stops within this buffer of route

# Speeding thresholds
speeding:
  threshold_factor: 1.08   # Flag if speed > posted * 1.08
  severe_threshold: 1.20   # Severe speeding > 20% over
  
# Output configuration
output:
  parquet_dir: "output/"
  stage_name: "@FLEET_INTELLIGENCE.ROUTE_CACHE.TELEMETRY_STAGE"
  tables:
    warehouses: "DIM_WAREHOUSE"
    stops: "DIM_STOP"
    trucks: "DIM_TRUCK"
    drivers: "DIM_DRIVER"
    trips: "FACT_TRIP"
    telemetry: "FACT_TRUCK_TELEMETRY"
    violations: "FACT_VIOLATION"
