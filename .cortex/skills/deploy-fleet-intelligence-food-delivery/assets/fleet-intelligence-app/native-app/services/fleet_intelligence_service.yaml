spec:
  containers:
    - name: fleet-intelligence
      image: /fleet_intelligence_setup/public/fleet_intel_repo/fleet-intelligence:latest
      env:
        SNOWFLAKE_SCHEMA: DATA
        SNOWFLAKE_WAREHOUSE: FLEET_INTEL_WH
        AGENT_SCHEMA: CORE
        AGENT_NAME: FLEET_INTELLIGENCE_AGENT
        PORT: "8080"
      readinessProbe:
        path: /health
        port: 8080
  endpoints:
    - name: fleet-intel-ui
      port: 8080
      public: true
