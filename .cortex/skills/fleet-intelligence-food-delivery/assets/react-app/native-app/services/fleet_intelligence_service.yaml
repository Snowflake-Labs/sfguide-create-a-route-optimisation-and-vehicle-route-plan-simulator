spec:
  containers:
    - name: fleet-intelligence
      image: /openrouteservice_setup/public/fleet_intel_repo/fleet-intelligence:v1.9.27
      env:
        SNOWFLAKE_SCHEMA: DATA
        SNOWFLAKE_WAREHOUSE: FLEET_INTEL_WH
        PORT: "8080"
      readinessProbe:
        path: /health
        port: 8080
  endpoints:
    - name: fleet-intel-ui
      port: 8080
      public: true
