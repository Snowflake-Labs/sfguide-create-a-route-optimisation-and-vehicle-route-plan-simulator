spec:
  containers:
    - name: demo-dashboard
      image: /openrouteservice_setup/public/image_repository/demo-dashboard:v1.0.25
      env:
        SNOWFLAKE_DATABASE: FLEET_INTELLIGENCE
        SNOWFLAKE_WAREHOUSE: ROUTING_ANALYTICS
        PORT: "8080"
      resources:
        requests:
          cpu: "0.5"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
  endpoints:
    - name: demo-dashboard-ui
      port: 8080
      public: true
