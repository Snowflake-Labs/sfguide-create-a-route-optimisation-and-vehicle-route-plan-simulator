spec:
  containers:
    - name: ors-control-app
      image: /openrouteservice_app/core/image_repository/ors_control_app:v1.0.177
      env:
        SNOWFLAKE_DATABASE: "OPENROUTESERVICE_APP"
        SNOWFLAKE_WAREHOUSE: "ROUTING_ANALYTICS"
        APP_VERSION: "1.0.175"
      resources:
        requests:
          cpu: "0.5"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
  endpoints:
    - name: ors-control-app
      port: 3001
      public: true
