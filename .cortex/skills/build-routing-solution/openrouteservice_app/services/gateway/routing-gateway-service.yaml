# Image tag MUST match openrouteservice_app/image-versions.env ($ROUTING_REVERSE_PROXY_TAG).
# Run scripts/check_image_versions.sh to verify before uploading this spec to the stage.
spec:
  containers:
    - name: reverse-proxy
      image: /openrouteservice_app/core/image_repository/routing_reverse_proxy:v1.1.0
      env:
        SERVER_HOST: 0.0.0.0
        SERVER_PORT: 8000
        VROOM_PORT: 3000
        ORS_PORT: 8082
        ORS_API_PATH: /ors/v2
        # v1.1.0 — no global ORS_SERVICE / VROOM_SERVICE. Every region (including
        # the default) is per-region; missing region resolves to this name.
        DEFAULT_REGION_NAME: SanFrancisco
  endpoints:
    - name: gateway
      port: 8000
      public: false
